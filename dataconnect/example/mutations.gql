mutation EnsureUserProfile(
  $fullName: String
  $phone: String
  $role: String!
) @auth(level: USER) {
  userProfile_upsert(
    data: {
      userId_expr: "auth.uid"
      fullName: $fullName
      phone: $phone
      role: $role
      createdAt_expr: "request.time"
      updatedAt_expr: "request.time"
    }
  )
}

mutation CreateCase(
  $consentStore: Boolean!
  $consentContact: Boolean!
) @auth(level: USER) {
  case_insert(
    data: {
      userId_expr: "auth.uid"
      status: PENDING
      consentStore: $consentStore
      consentContact: $consentContact
      consentAt_expr: "request.time"
      createdAt_expr: "request.time"
      updatedAt_expr: "request.time"
    }
  )
}

mutation DeleteCase($caseId: UUID!) @auth(level: USER) {
  case_delete(
    first: {
      where: {
        id: { eq: $caseId }
        userId: { eq_expr: "auth.uid" }
      }
    }
  )
}

mutation CreateIncident(
  $caseId: UUID!
  $description: String!
  $incidentDate: Date!
  $city: String
  $stateCode: String
) @auth(level: USER) @transaction {
  query @redact {
    case(
      first: {
        where: {
          id: { eq: $caseId }
          userId: { eq_expr: "auth.uid" }
        }
      }
    ) @check(expr: "this != null", message: "Case not found") {
      id
    }
  }
  incident_insert(
    data: {
      caseId: $caseId
      description: $description
      incidentDate: $incidentDate
      city: $city
      stateCode: $stateCode
      createdAt_expr: "request.time"
    }
  )
}

